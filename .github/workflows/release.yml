name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Sync version to package.json and Cargo.toml
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Replace only line 3 (version under [package]) in Cargo.toml
          awk -v ver="version = \"$VERSION\"" 'NR==3{$0=ver}1' src-tauri/Cargo.toml > src-tauri/Cargo.toml.tmp && mv src-tauri/Cargo.toml.tmp src-tauri/Cargo.toml
          # Replace version in package.json
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Build Tauri (no bundle)
        run: npm run tauri build -- --no-bundle

      - name: Rename executable
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cp src-tauri/target/release/hlm-certificate-generator.exe "HLM证书批量生成器_${VERSION}_x64.exe"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"
          EXE="HLM证书批量生成器_${VERSION}_x64.exe"
          gh release create "$TAG" "$EXE" --title "HLM证书批量生成器 v$VERSION" --notes "See the assets to download and install this version."


